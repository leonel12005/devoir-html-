<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup Page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="left">
        <h1>Ready to start your success story?</h1>
        <p class="subtitle">Signup to our website and start leafing through your favorite literature today!</p>

        <form>
            <div class="input-group">
                <label for="fullname">Full name</label>
                <input type="text" id="fullname" placeholder="Jane Doe" required>
            </div>

            <div class="input-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="janedoe@mail.com" required>
            </div>

            <div class="input-group active-field">
                <label for="interest">Area of interest</label>
                <select id="interest" required>
                    <option value="" disabled selected hidden>Area of interest</option>
                    <option value="science">Science</option>
                    <option value="business">Business</option>
                    <option value="literature">Literature</option>
                </select>
            </div>

            <div class="checkbox">
                <input type="checkbox" id="terms" required>
                <label for="terms">I agree to the <a href="#">Terms & Conditions</a></label>
            </div>

            <button type="submit" class="btn-signup">Sign up</button>
        </form>
    </div>

    <div class="right">
        <img src="image.jpg" alt="Illustration">
    </div>

</div>

</body>
</html>
